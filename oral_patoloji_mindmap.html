## Dil Hastalıkları

### Makroglossi → dil büyümesi, nedene göre tedavi

##### Down sendromu → hipotoni + makroglossi

##### Mukopolisakkaridozlar → glikoprotein birikimi → dil büyümesi

##### Amiloidoz → dil en sık tutulan organ
##### Akromegali → GH fazlalığı → dil + dudak büyümesi

#### Pernisiyöz anemi → B12 eksikliği

#### Siyah kıllı dil → aspergillus birikimi

#### Angular şeylitis → köşe ağrısı + kızarıklık
#### Protez stomatiti → hareketli protez altında eritem

#### Kazınmaz beyaz lezyon → friksiyonel hiperkeratozdan ayırt edici

#### En sık herpes → herpes labialis (uçuk)
#### Parmakta herpes → dolama (herpetik panaris)
#### Virüs gangliyonda kalır → tekrarlayan lezyonlar

#### Sekonder form → dudak, damak, gingiva → lokalize vezikül

#### VZV → su çiçeği latansisi → reaktivasyon
#### Öncesinde ağrı → HSV'den ayırt (HSV: kaşıntı önce)
#### İmmünsüprese → tehlikeli reaktivasyon riski

#### Triad → dış kulak yolu vezikülleri + yüz felci + dilin 2/3 ön tat kaybı

### Koksaki Virüs Hastalıkları
#### El-Ayak-Ağız → oral ülser + ekstremite vezikülleri → okul çağı çocukları

#### Koplik lekeleri → ortası beyaz küçük kırmızı maküller → patognomonik
#### Whartin-Finkeldey dev hücreleri
#### Enamel hipoplazisi

### Konjenital Sifiliz → Hutchinson Triadı
#### Kama biçimli insisivler + dut biçimli molar
#### Keratit
#### Sağırlık → 8. sinir tutulumu

#### Oval, veziküller yok → herpesten ayırt edici

#### Ağız dışında görülmez

#### Kronik → az ağrılı, skar dokusu → karsinom taklit eder

#### Anaerob bakteriler → gangren
#### Yüksek doz penisilin → tedavi

### Behçet Hastalığı → nötrofilik vaskülit küçük-orta damarlar

#### Vasküler anevrizma rüptürü → ölüm nedeni

### Polianjiitisli Granülomatoz (Wegener) → nekrotizan vaskülit

#### Çilek gingivit → oral bulgu
#### Tedavisiz 1 yılda %80 mortalite
#### Steroid + siklofosfamid + TNF antagonisti

### Kawasaki Hastalığı → çocukluk akut febril vaskülit
#### Anti-endotelyal hücre antikorları
#### Hastaların %80'i → 4 yaş altı
#### 5 gün+ ateş → major tanı kriteri
#### Koroner arter tutulumu → primer odak
#### Oral bulgular → kırmızı çatlak dudak + çilek dil

### Löködem → etiyolojisi bilinmeyen beyaz lezyon → malignleşmez!

#### Kazınamaz → pamukçuktan ayırt edici

### Revers Smokers Palatal Lezyonu → premalign! → en önemli özellik
### Fordyce Granülleri → ektopik sebaseöz bezler → dudak + ağız içi

##### Herediter ektodermal displazi → hipodonti/anodonti + konik dişler + kuru cilt
##### Hipodontide en sık → 3. molar, maksiller lateral, biküspitler

#### Hiperdonti → fazla diş → özellikle santral/lateral bölgede
##### Cleidokraniyal dizostozda belirgin hiperdonti

#### Geminasyon → tek tomurcuktan iki kron → diş sayısı normal
#### Füzyon → iki diş birleşimi → diş sayısı eksik

### Diş Yapı Anomalileri

#### Dens İnvaginatus → lingual çukur abartılı → kalıcı maksiller lateral

#### Dens Evaginatus → oklüzal anormal tüberkül → premolarda bilateral

### Dentinogenezis İmperfekta → DSPP gen mutasyonu → OD
#### Tip I → osteogenezis imperfekta eşliği → Tip I kollajen mutasyonu
#### Tip II / III → sadece dentin bozukluğu → kemik normal

### Kistik Lezyonlar

#### Tiroglossal Kanal Kisti → dil hareketiyle yer değiştirir
##### Boyundaki kistlerin %75'i → en sık boyun kisti
##### Orta hat, nadiren malignite

#### Brankial Kleft Kisti → boyun ön-yan → yassı epitel + lenfoid doku

#### Lingual Tiroid → embriyolojik göç anomalisi → dil kökünde tiroid

#### Kavernöz Lenfanjiom (Kistik Higroma) → submandibuler bölge
##### Turner sendromunda sık
##### Spontan gerileme yok → eksizyon gerekir

## Sendromlar

### Melkersson-Rozental → klasik triad
#### Tekrarlayan periferik fasiyal paralizi
#### Ağrısız gode bırakmayan orofasiyal ödem
#### Fissürlü dil

### Plummer-Vinson (Sideropenik Disfaji)
#### Ağrılı kırmızı dil + mukozal atrofi + demir eksikliği anemisi + özofageal web + disfaji
#### Orta yaş kadınlar → tipik
#### Oral + özofageal SCC riski artmış

### Crouzon Sendromu → FGFR2 mutasyonu → 1/65.000
#### Şiddetli maksiller hipoplazi + hipertelorizm
#### Lingual çapraz kapanış yaygın

### Treacher-Collins (Mandibulofasiyal Dizostoz) → TCOF1 mutasyonu
#### Kuş/balık yüz → dar yüz, aşağı gözler, mikrognati

### Pierre Robin Sekansı → triad
#### Yarık damak + mandibular mikrognati + glossoptoz → hava yolu tıkanıklığı

### Van der Woude → IRF6 gen mutasyonu
#### Sendromik yarıklanmanın en yaygın şekli → tüm yarık vakalarının %2'si

### Papillon-Lefèvre → OR kalıtım
#### Palmoplantar hiperkeratoz + lökosit fonksiyon bozukluğu + periodontidis
#### Süt ve daimi dişlerde erken kayıp → hızlı periodontal yıkım
#### Etken aktinobasillus → antibiyotiğe dirençli → sistemik retinoid

### Skleroderma → sistemik fibrozis → oral yansıma
#### Mukozal fibrozis → ağız açma güçlüğü
#### PDL boşluğu genişlemesi → radyolojik bulgu

### Eagle Sendromu → stylohyoid ligament mineralizasyonu

## Pulpa Hastalıkları

#### Kollateral dolaşım oluşturamaz

#### Yansıyan ağrı → yanlış diş lokalizasyonu riski

### Reversible Pulpit (Pulpa Hiperemi) → hafif irritasyon → damar dilatasyonu

### Akut Pulpit → nötrofil infiltrasyonu → kronik pulpitten ayırt edici

### Kronik Pulpit → mononükleer hücre + kollajen/skar dokusu

### Kronik Hiperplastik Pulpit (Pulpa Polibi) → çocuk ve genç erişkin

#### Aşırı granülasyon dokusu → taşma + kabarıklık
#### Ağız içine drene → semptom az
#### İrreversibl → ekstirpasyon ya da çekim

### Periapikal Hastalıklar

#### Periapikal Granülom (Apikal Periodontitis) → granülasyon dokusu

##### Diş hassasiyeti yok! → tanı tuzağı

#### Periapikal (Radiküler) Kist → Malassez artıklarından gelişir
##### Non-keratinize skuamoz epitel
##### Rushton cisimleri → lineer lameller kalsifikasyonlar
##### Cerrahi eksizyon

#### Periapikal Abse → yoğun bakteri + nötrofil → likefaksiyon nekrozu
##### Kist gelişimi olmaz → likefaksiyon ortamı eritir
##### Parulis (Gumboil) → perforasyon yerindeki granülasyon dokusu
##### Fistülleşme → kanin + mandibüler kesici en iyi örnek

## Periodontal Hastalıklar

### Gingivitis → mikrobial dental plak → dişeti iltihabı
#### Periodontal ligament + sement tutulumu YOK
#### Reversibil → periodontitisten farkı

### Periodontidis → ligament + alveolar kemik + sement tutulumu
#### Erişkinlerde en sık diş kaybı sebebi
#### Risk → sigara, DM, ileri yaş, düşük sosyoekonomik
#### Ataşman kaybı → diş apikal yer değiştirir → periodontal cep
#### Jüvenil → A. actinomycetemcomitans, 5–15 yaş
#### Prepubertal → lökosit adezyon defekti, 4 yaş kız çocuk

### Gingiva Hiperplazisi → ilaç + sistemik + lokal nedenler
#### Fenitoin + siklosporin + Ca kanal blokerleri (nifedipin) → en önemli
#### Herediter fibromatozis
#### Lösemi
#### Hormonal uyarı → östrojen, testosteron

### Hormonal Gingivitis → progesteron artışı → puberte, gebelik
### Gingival Fibromatozis → fibröz doku artışı → inflamasyon yok → eksizyon

## Tümör Benzeri Lezyonlar

#### Gingiva → özellikle 1. molar anteriyoru
#### Brown tümörü + pyojenik granülom ile karışır

### Fibrom → reaktif hiperplazi
#### İrritasyon fibromu → sürekli ısırma → bukkal mukoza
#### Epulis fissuratum → protez kenarı fibröz hiperplazisi
#### Dev hücreli fibrom → yıldız şekilli multinükleer fibroblast

### Damağın Papiller Hiperplazisi → hareketli protez kullananlarda
#### Sert damakta kaldırım taşı şekilli multipil eritematöz projeksiyonlar
#### Malignite riski yok → non-keratinize akantoz
#### Cowden sendromu + Darier hastalığı birlikteliği`;

(async () => {
  try {
    const { Transformer } = window.markmap;
    const { Markmap, loadCSS, loadJS } = window.markmap;
    const transformer = new Transformer();
    const { root, features } = transformer.transform(md);
    const { styles, scripts } = transformer.getUsedAssets(features);
    if (styles) loadCSS(styles);
    if (scripts) await loadJS(scripts, { getMarkmap: () => window.markmap });
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.cssText = 'width:100%;height:100%;';
    document.getElementById('markmap-container').appendChild(svgEl);
    const colorFn = (node) => {
      const palette = ['#534AB7','#0F6E56','#993C1D','#185FA5','#3B6D11','#854F0B','#993556'];
      return palette[node.depth % palette.length];
    };
    window.mm = Markmap.create(svgEl, {
      color: colorFn,
      duration: 400,
      maxWidth: 300,
      zoom: true,
      pan: true,
      initialExpandLevel: 2,
      paddingX: 16,
      spacingVertical: 6,
      spacingHorizontal: 60,
    }, root);
  } catch(e) {
    document.getElementById('markmap-container').innerHTML = '<p style="color:var(--color-text-secondary);padding:1rem">Harita yüklenemedi: ' + e.message + '</p>';
  }
})();
